name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: plushie-renderer
            asset: plushie-renderer-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: plushie-renderer
            asset: plushie-renderer-linux-aarch64
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: plushie-renderer
            asset: plushie-renderer-darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: plushie-renderer.exe
            asset: plushie-renderer-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev \
            libx11-dev cmake libfontconfig1-dev libfreetype-dev pkg-config

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          cp "$src" "${{ matrix.asset }}"

      - name: Generate checksum
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  build-wasm:
    name: Build (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install binaryen
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Build WASM
        run: WASM_BINDGEN_EXTERNREF=0 wasm-pack build crates/plushie-renderer-wasm --target web

      - name: Optimize with wasm-opt
        run: |
          wasm-opt crates/plushie-renderer-wasm/pkg/plushie_renderer_wasm_bg.wasm \
            -Oz \
            --enable-bulk-memory \
            --enable-mutable-globals \
            --enable-nontrapping-float-to-int \
            --enable-sign-ext \
            --enable-multivalue \
            -o crates/plushie-renderer-wasm/pkg/plushie_renderer_wasm_bg.wasm

      - name: Package
        run: tar czf plushie-renderer-wasm.tar.gz -C crates/plushie-renderer-wasm/pkg .

      - name: Generate checksum
        run: sha256sum plushie-renderer-wasm.tar.gz > plushie-renderer-wasm.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: plushie-renderer-wasm
          path: |
            plushie-renderer-wasm.tar.gz
            plushie-renderer-wasm.tar.gz.sha256

  release:
    name: Create Release
    needs: [build, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            plushie-*
