# cargo-deny config for plushie-rust.
#
# Run locally with `cargo deny check`. CI runs this on the nightly
# audit schedule alongside `cargo audit`. License coverage is the
# primary motivation: plushie ships as MIT OR Apache-2.0, and the
# transitive dep graph pulls in a few hundred crates. A permissive
# allowlist matches what iced, winit, wgpu, and similar upstreams
# already depend on; GPL / AGPL / OSL licenses would be surprising
# and worth surfacing.

[advisories]
yanked = "warn"

[licenses]
# Permissive licenses compatible with MIT OR Apache-2.0 distribution.
# Zlib, BSD variants, ISC, Unicode-3.0, and MPL-2.0 match the current
# transitive graph. CC0-1.0 and 0BSD are effectively public domain.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "OpenSSL",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "allow"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
