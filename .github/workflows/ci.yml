name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref. Branches and PRs are isolated
# from each other so a push to main doesn't cancel an in-flight PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only. Individual jobs that need write (none today)
# can opt in.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  linux:
    name: Linux (full)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev \
            libx11-dev cmake libfontconfig1-dev libfreetype-dev pkg-config

      - name: Check
        run: cargo check --workspace --all-targets --locked

      - name: Check (no default features, all targets)
        run: cargo check --workspace --no-default-features --all-targets --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked

      - name: Clippy (plushie + wire feature)
        run: cargo clippy -p plushie --all-targets --features wire --locked

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo nextest run --workspace --profile ci --locked

      - name: Test - examples
        run: cargo test -p plushie --examples --locked

      # The "wire,dev" combo (wire_hot_reload) is currently broken at
      # the lib-level (see follow-up-questions.md Q11); add the
      # `cargo nextest run -p plushie --features "wire,dev" --test
      # wire_hot_reload --profile ci` step back once the dev::overlay
      # module is ported to TreeNode.
      - name: Test - no runner features
        run: cargo nextest run -p plushie --no-default-features --test no_runner_features --profile ci --locked

      - name: Check release build
        run: cargo check --workspace --release --locked

      - name: Feature permutation - wire only
        run: cargo check -p plushie --no-default-features --features wire --all-targets --locked

      - name: Feature permutation - direct only
        run: cargo check -p plushie --no-default-features --features direct --all-targets --locked

      - name: Check WASM
        run: cargo check --target wasm32-unknown-unknown -p plushie-core -p plushie-widget-sdk -p plushie-renderer-lib -p plushie-renderer-wasm --locked

      # `cargo package --no-verify` catches manifest-layout problems
      # (missing files, broken `include`/`exclude`, missing readme,
      # version-out-of-sync) without trying to compile against
      # crates.io. The `--verify` step would require all path-dep
      # workspace crates to already be published at the current
      # version, which is only true after the release pipeline has
      # uploaded them. The release workflow itself runs `cargo
      # publish` per-crate in dependency order, which is the actual
      # final check.
      - name: Package check
        run: cargo package --workspace --no-verify --allow-dirty

      - name: Doc build
        # No-deps because docs.rs renders dep docs separately. Catches
        # link-time failures and missing-dep cases. Doc warnings are
        # informational here; the doc-warnings sweep is its own
        # follow-up.
        run: cargo doc --workspace --no-deps --locked

      # Build the WASM bundle the release workflow ships, so link-time
      # failures in the wasm-pack pipeline surface on PR rather than
      # at tag time. `--dev` keeps it fast (no wasm-opt).
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: WASM bundle build
        run: WASM_BINDGEN_EXTERNREF=0 wasm-pack build crates/plushie-renderer-wasm --target web --dev

  cross-os:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - uses: taiki-e/install-action@nextest

      - name: Check
        run: cargo check --workspace --all-targets --locked

      # Run the full unit suite on macOS and Windows, not just the wire
      # smoke set. Process spawning, stdio framing, file path semantics,
      # and the env var whitelist all have platform-specific paths;
      # the unit tests catch regressions there before the release
      # workflow does. Clippy and fmt stay Linux-only.
      #
      # `wire_connect` is cfg-gated to Unix at the crate level (it
      # uses Unix-domain sockets), so the Windows job compiles it to
      # an empty binary and runs zero tests from it without failing.
      - name: Test
        run: cargo nextest run --workspace --profile ci --locked

      - name: Test - examples
        run: cargo test -p plushie --examples --locked

      - name: Test - wire feature
        run: cargo nextest run -p plushie --features wire --profile ci --locked

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
      - uses: Swatinem/rust-cache@v2

      # License and advisory checks are seconds and worth catching at
      # PR time. The nightly-audit workflow still runs them on its
      # schedule against the latest advisory db.
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.4 --locked

      - name: Run cargo deny
        run: cargo deny check
