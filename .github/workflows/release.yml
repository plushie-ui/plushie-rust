name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # CI gate. Mirrors the Linux PR pipeline so a tag push cannot
  # bypass main being green. Subsequent build / publish jobs
  # `needs: [ci]`, so a red gate prevents asset upload and crates.io
  # publish. Cross-OS coverage runs in the build matrix below.
  ci:
    name: CI gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev \
            libx11-dev cmake libfontconfig1-dev libfreetype-dev pkg-config

      - name: Check (default features)
        run: cargo check --workspace --all-targets --locked

      - name: Check (no default features)
        run: cargo check --workspace --no-default-features --all-targets --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked

      - name: Clippy (wire feature)
        run: cargo clippy -p plushie --all-targets --features wire --locked

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo nextest run --workspace --profile ci --locked

      - name: Doc
        run: cargo doc --workspace --no-deps --locked

      - name: Package
        run: cargo package --workspace --no-verify --allow-dirty

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.4 --locked

      - name: Deny
        run: cargo deny check

  build:
    name: Build (${{ matrix.target }})
    needs: [ci]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: plushie-renderer
            asset: plushie-renderer-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: plushie-renderer
            asset: plushie-renderer-linux-aarch64
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: plushie-renderer
            asset: plushie-renderer-darwin-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: plushie-renderer
            asset: plushie-renderer-darwin-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: plushie-renderer.exe
            asset: plushie-renderer-windows-x86_64.exe
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            binary: plushie-renderer.exe
            asset: plushie-renderer-windows-aarch64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev \
            libx11-dev cmake libfontconfig1-dev libfreetype-dev pkg-config

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      # The aarch64-unknown-linux-gnu cross build runs in cross-rs's
      # default Docker image. That image must have aarch64 versions of
      # the iced/winit system deps (libxkbcommon, libwayland-client,
      # libx11) available for linking. If a future cross-rs image
      # update drops one of them, this build will fail at link time
      # and a `Cross.toml` with a `pre-build` hook (apt-get install
      # libxkbcommon-dev:arm64 libwayland-dev:arm64 libx11-dev:arm64)
      # is the documented fix. Today the default image suffices.
      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --profile dist --target ${{ matrix.target }} --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --profile dist --target ${{ matrix.target }} --locked

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/dist/${{ matrix.binary }}"
          cp "$src" "${{ matrix.asset }}"

      - name: Generate checksum
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi

      - name: Generate Sigstore attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  build-wasm:
    name: Build (wasm32)
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32

      - name: Install wasm-pack
        # Pin so a silent upstream change doesn't move release outputs
        # underneath us. Bump when a new wasm-pack release is well-aged.
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Install binaryen
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Build WASM
        run: WASM_BINDGEN_EXTERNREF=0 wasm-pack build crates/plushie-renderer-wasm --target web

      - name: Optimize with wasm-opt
        run: |
          wasm-opt crates/plushie-renderer-wasm/pkg/plushie_renderer_wasm_bg.wasm \
            -Oz \
            --enable-bulk-memory \
            --enable-mutable-globals \
            --enable-nontrapping-float-to-int \
            --enable-sign-ext \
            --enable-multivalue \
            -o crates/plushie-renderer-wasm/pkg/plushie_renderer_wasm_bg.wasm

      - name: Package
        run: tar czf plushie-renderer-wasm.tar.gz -C crates/plushie-renderer-wasm/pkg .

      - name: Generate checksum
        run: sha256sum plushie-renderer-wasm.tar.gz > plushie-renderer-wasm.tar.gz.sha256

      - name: Generate Sigstore attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: plushie-renderer-wasm.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: plushie-renderer-wasm
          path: |
            plushie-renderer-wasm.tar.gz
            plushie-renderer-wasm.tar.gz.sha256

  release:
    name: Create Release
    needs: [build, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            plushie-*
