name: Nightly audit

# Run cargo audit and cargo deny on a nightly schedule to surface
# RustSec advisories and license / supply-chain drift against the
# workspace dep graph. Intentionally not wired into the main CI
# pipeline or preflight: both are informational, not blocking, and
# add meaningful wall time.

on:
  schedule:
    # 04:00 UTC every day. Well outside normal working hours so a
    # failing run doesn't drown daytime notifications.
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --deny warnings

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny
        run: cargo deny check
