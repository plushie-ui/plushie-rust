[package]
name = "plushie-renderer"
description = "Native GUI renderer powered by Iced"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
keywords.workspace = true
categories.workspace = true
readme = "README.md"

[lib]
name = "plushie_renderer"
path = "src/lib.rs"

[lints]
workspace = true

[[bin]]
name = "plushie-renderer"
path = "src/main.rs"

[dependencies]
plushie-core = { version = "0.6.1", path = "../plushie-core" }
plushie-widget-sdk = { version = "0.6.1", path = "../plushie-widget-sdk" }
plushie-renderer-lib = { version = "0.6.1", path = "../plushie-renderer-lib" }
env_logger = "0.11"
log = "0.4"
iced = { version = "0.8", package = "plushie-iced", features = ["tokio", "advanced", "sysinfo", "a11y"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
tokio = { version = "1", features = ["sync"] }
iced_test = { version = "0.8", package = "plushie-iced-test" }
sha2 = "0.10"
rfd = "0.15"
arboard = "3"
notify-rust = "4"
getrandom = "0.3"
